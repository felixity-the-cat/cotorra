%YAML 1.2
---
model_presets:
  llama_32: &llama_32 # ~76.9M param @ |vocab|~1340
    model_name: meta-llama/Llama-3.2-1B
    model_args:
      hidden_size: 1024
      intermediate_size: 2048
      num_hidden_layers: 9
      num_attention_heads: 8

  llama_32_mid: &llama_32_mid # ~8.2M param @ |vocab|~1340
    model_name: meta-llama/Llama-3.2-1B
    model_args:
      hidden_size: 256
      intermediate_size: 1024
      num_hidden_layers: 6
      num_attention_heads: 8
      max_position_embeddings: 32768

  qwen_3: &qwen_3 # ~74.1M param @ |vocab|~1340
    model_name: Qwen/Qwen3-1.7B-Base
    model_args:
      hidden_size: 512
      intermediate_size: 1024
      num_attention_heads: 4
      num_key_value_heads: 4

  qwen_3_mid: &qwen_3_mid # ~8.4M param @ |vocab|~1340
    model_name: Qwen/Qwen3-1.7B-Base
    model_args:
      hidden_size: 128
      intermediate_size: 256
      num_attention_heads: 4
      num_key_value_heads: 2
      max_position_embeddings: 32768

  gemma_3: &gemma_3
    # ~75.7M param @ |vocab|~1340
    # set: {training_args: {gradient_checkpointing: !!bool true}}
    model_name: google/gemma-3-1b-pt
    model_args:
      hidden_size: 512
      intermediate_size: 1024

  gemma_3_mid: &gemma_3_mid # ~7.8M param @ |vocab|~1340
    model_name: google/gemma-3-1b-pt
    model_args:
      hidden_size: 128
      intermediate_size: 256
      num_attention_heads: 2
      num_key_value_heads: 1
      max_position_embeddings: 32768

model: *llama_32

max_seq_len: !!int &max_len 4096
n_epochs: !!int 2
run_name: &run_name cotorra-tuning

tokens_of_interest: &tois
  - XFR-IN//icu
  - RESP//imv
  - DSCG//expired
  - ASMT//cam_total_yes
  - LABEL//*

wandb:
  project: cotorra
  run_name: *run_name

custom_loss: !!bool true
quantile_token_loss:
  qt_weight: !!float 0.5
label_weighted_loss:
  tokens_of_interest: *tois
  toi_weight: !!float 20.0

time_based_rope:
  sec_per_pos_id: !!int 300

training_args:
  report_to: wandb
  run_name: *run_name
  per_device_train_batch_size: !!int 8
  per_device_eval_batch_size: !!int 8
  save_total_limit: !!int 1
  metric_for_best_model: eval_loss
  load_best_model_at_end: !!bool true
  greater_is_better: !!bool false
  eval_strategy: steps # keep eval/save in sync for load_best_model_at_end
  eval_steps: !!float 0.1 # evaluate every 1/10th of total training steps (1 epoch run)
  prediction_loss_only: !!bool true # may improve training speed
  save_strategy: steps
  save_steps: !!float 0.1 # save checkpoint every 1/10th of total training steps (1 epoch run)
  ddp_find_unused_parameters: !!bool false
  # neftune_noise_alpha: !!float 5.0
  auto_find_batch_size: !!bool false # turning this on may cause issues with hyperparameter tuning
  learning_rate: !!float 2e-4
  gradient_accumulation_steps: !!int 1
  remove_unused_columns: !!bool false # otherwise `s_elapsed` is automatically dropped
  # bf16: !!bool true
  # max_steps: !!int 10 # uncomment for testing purposes only
  local_rank: -1
  # gradient_checkpointing: !!bool true # needed for large gemma architectures
  use_cache: !!bool false # incompatible with gradient_checkpointing

tuning_args:
  direction: minimize
  backend: optuna
  n_trials: !!int 10

privacy_parameters:
  noise_multiplier: !!float 1.5
  max_grad_norm: !!float 1.0
