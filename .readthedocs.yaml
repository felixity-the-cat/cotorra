# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    # git-revision-date-localized needs full history; RTD clones shallow by default
    post_checkout:
      - git fetch --unshallow || true

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - path: .
      extra_requirements:
        - docs
