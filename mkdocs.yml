site_name: Cotorra
site_description: Configurable trainer for generative event models
site_url: https://cotorra.readthedocs.io/
repo_url: https://github.com/bbj-lab/cotorra
repo_name: bbj-lab/cotorra

theme:
  name: material
  logo: svg/emoji_u1f99c.svg
  favicon: svg/emoji_u1f99c.svg
  font: false
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - footnotes
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

validation:
  links:
    not_found: warn

plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_bases: true
            show_root_heading: true

nav:
  - Home: index.md
  - API Reference:
      - Overview: api/index.md
      - Training: api/training.md
      - Extraction: api/extraction.md
      - Scoring: api/scoring.md
