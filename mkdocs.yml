site_name: Cotorra
site_description: Configurable trainer for generative event models
site_url: https://cotorra.readthedocs.io/
repo_url: https://github.com/bbj-lab/cotorra
repo_name: bbj-lab/cotorra

theme:
  name: material
  custom_dir: overrides
  logo: svg/emoji_u1f99c.svg
  favicon: svg/emoji_u1f99c.svg
  font: false
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

validation:
  links:
    not_found: warn

plugins:
  - search
  - include-markdown
  - callouts
  - git-revision-date-localized:
      fallback_to_build_date: true
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_bases: true
            show_root_heading: false
            show_root_toc_entry: false
            heading_level: 3

nav:
  - Home: index.md
  - API Reference:
      - CLI: api/cli.md
      - Training: api/training.md
      - Extraction: api/extraction.md
      - Scoring: api/scoring.md
  - Recipes:
      - Overview: recipes/index.md
      - Development Workflow: recipes/development-workflow.md
      - Transfer Learning: recipes/transfer-learning.md
